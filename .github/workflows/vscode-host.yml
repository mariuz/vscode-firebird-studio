name: Extension Host Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  extension-host-tests:
    name: VS Code Extension Host Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      firebird:
        image: firebirdsql/firebird:5
        env:
          FIREBIRD_ROOT_PASSWORD: masterkey
          FIREBIRD_DATABASE: test.fdb
          FIREBIRD_CONF_WireCrypt: Disabled
        ports:
          - 3050:3050
        options: >-
          --health-cmd="bash -c 'cat < /dev/null > /dev/tcp/localhost/3050'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      FIREBIRD_HOST: localhost
      FIREBIRD_PORT: 3050
      FIREBIRD_DATABASE: /var/lib/firebird/data/test.fdb
      FIREBIRD_USER: sysdba
      FIREBIRD_PASSWORD: masterkey

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Firebird client tools (isql-fb, for the isql-terminal integration tests)
        run: sudo apt-get update && sudo apt-get install -y firebird3.0-utils
        continue-on-error: true

      - name: Wait for Firebird to be ready
        run: |
          echo "Waiting for Firebird to accept connections..."
          for i in $(seq 1 30); do
            if bash -c 'cat < /dev/null > /dev/tcp/localhost/3050' 2>/dev/null; then
              echo "Firebird is ready."
              break
            fi
            echo "Attempt $i: not ready yet, retrying in 3s..."
            sleep 3
          done
          bash -c 'cat < /dev/null > /dev/tcp/localhost/3050' 2>/dev/null || (echo "Firebird did not become ready in time" && exit 1)

      - name: Seed test database
        run: node scripts/seed-test-db.js

      - name: Compile extension
        run: npm run compile

      - name: Compile extension host test suite
        run: ./node_modules/.bin/tsc -p tsconfig.suite.json --noEmitOnError false

      - name: Run extension host tests (headless)
        run: xvfb-run -a npx vscode-test
        env:
          DISPLAY: ":99.0"
