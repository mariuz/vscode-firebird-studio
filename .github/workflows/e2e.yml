name: E2E – Firebird Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  e2e-tests:
    name: E2E Tests (Node ${{ matrix.node }}, Firebird ${{ matrix.firebird }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node: [24, 25, 26]
        firebird: [3, 4, 5, '6-snapshot']

    services:
      firebird:
        image: firebirdsql/firebird:${{ matrix.firebird }}
        env:
          FIREBIRD_ROOT_PASSWORD: masterkey
          FIREBIRD_DATABASE: test.fdb
          FIREBIRD_CONF_WireCrypt: Disabled
          # Firebird 3 defaults to Legacy_Auth only, 4+ defaults to Srp; accept both so the
          # same client config works unmodified across the whole version matrix.
          FIREBIRD_CONF_AuthServer: "Legacy_Auth;Srp;Win_Sspi"
        ports:
          - 3050:3050
        options: >-
          --health-cmd="bash -c 'cat < /dev/null > /dev/tcp/localhost/3050'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      FIREBIRD_HOST: localhost
      FIREBIRD_PORT: 3050
      FIREBIRD_DATABASE: /var/lib/firebird/data/test.fdb
      FIREBIRD_USER: sysdba
      FIREBIRD_PASSWORD: masterkey

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Wait for Firebird to be ready
        run: |
          echo "Waiting for Firebird to accept connections..."
          for i in $(seq 1 30); do
            if bash -c 'cat < /dev/null > /dev/tcp/localhost/3050' 2>/dev/null; then
              echo "Firebird is ready."
              break
            fi
            echo "Attempt $i: not ready yet, retrying in 3s..."
            sleep 3
          done
          bash -c 'cat < /dev/null > /dev/tcp/localhost/3050' 2>/dev/null || (echo "Firebird did not become ready in time" && exit 1)

      - name: Seed test database
        run: node scripts/seed-test-db.js
        env:
          FIREBIRD_HOST: localhost
          FIREBIRD_PORT: 3050
          FIREBIRD_DATABASE: /var/lib/firebird/data/test.fdb
          FIREBIRD_USER: sysdba
          FIREBIRD_PASSWORD: masterkey

      - name: Compile E2E tests
        run: ./node_modules/.bin/tsc -p tsconfig.e2e.json --noEmitOnError false

      - name: Run E2E tests
        run: ./node_modules/.bin/mocha 'out/test/e2e/**/*.test.js' --timeout 30000
        env:
          FIREBIRD_HOST: localhost
          FIREBIRD_PORT: 3050
          FIREBIRD_DATABASE: /var/lib/firebird/data/test.fdb
          FIREBIRD_USER: sysdba
          FIREBIRD_PASSWORD: masterkey

      - name: Show Firebird container log on failure
        if: failure()
        run: |
          container="$(docker ps -aq --filter ancestor=firebirdsql/firebird:${{ matrix.firebird }} | head -n1)"
          if [ -n "$container" ]; then
            docker logs "$container" --tail 100
          else
            echo "Could not find the Firebird service container."
          fi
