<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebird Connection Profiler</title>
  <link type="text/css" rel="stylesheet" href="/css/app.css" media="screen,projection" />
</head>
<body>
  <div id="toolbar">
    <button id="btn-refresh">Refresh Now</button>
    <button id="btn-pause" class="secondary">Pause</button>
    <span class="toolbar-spacer"></span>
    <span id="status"></span>
  </div>

  <div id="table-wrapper">
    <table id="activity-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Remote Address</th>
          <th>State</th>
          <th>Isolation</th>
          <th>Current Statement</th>
          <th>Reads/s</th>
          <th>Writes/s</th>
          <th>Fetches/s</th>
          <th>Seq/s</th>
          <th>Idx/s</th>
        </tr>
      </thead>
      <tbody id="activity-body"></tbody>
    </table>
    <div id="loading">Loading…</div>
    <div id="error-banner" style="display:none;"></div>
    <div id="empty-banner" style="display:none;">No other active connections.</div>
  </div>

  <script type="text/javascript" src="/js/app.js"></script>
</body>
</html>
