<!DOCTYPE html>
<html>
  <head>
    <!-- Import stylesheets -->
    <link type="text/css" rel="stylesheet" href="/css/loader.css" media="screen,projection" />
    <link type="text/css" rel="stylesheet" href="/css/datatables.min.css" media="screen,projection" />
    <link type="text/css" rel="stylesheet" href="/css/app.css" media="screen,projection" />
  </head>

  <body>
    <div class="img-wrapper"><img src="/img/icon.png" /></div>
    <div id="loader-wrapper">
      <div id="loader"></div>
      <div class="loader-section section-left"></div>
      <div class="loader-section section-right"></div>
    </div>

    <!-- Tab bar (shown for batch results) -->
    <div id="tab-bar" style="display:none;"></div>

    <div id="content">
      <!-- Single-result view (legacy) -->
      <div id="single-result">
        <div class="container" id="zero-results" style="display:none; width:100%"><p>Records found: 0</p></div>
        <div class="container" style="width:100%">
          <table id="query-results" class="row-border order-column cell-border compact display" style="width:100%;"></table>
        </div>
      </div>

      <!-- Batch result panels, one per statement -->
      <div id="batch-results"></div>
    </div>

    <!-- Edit-mode overlay: generated UPDATE SQL -->
    <div id="update-modal" style="display:none;">
      <div id="update-modal-inner">
        <h3>Generated UPDATE Statement</h3>
        <pre id="update-sql-text"></pre>
        <div class="modal-actions">
          <button id="btn-copy-update">Copy to Clipboard</button>
          <button id="btn-close-modal">Close</button>
        </div>
      </div>
    </div>

    <!-- JavaScript at end of body for optimized loading -->
    <script type="text/javascript" src="/js/jquery.min.js"></script>
    <script type="text/javascript" src="/js/pdfmake.min.js"></script>
    <script type="text/javascript" src="/js/vfs_fonts.min.js"></script>
    <script type="text/javascript" src="/js/datatables.min.js"></script>
    <script type="text/javascript" src="/js/app.js"></script>
  </body>
</html>
