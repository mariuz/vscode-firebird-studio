<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebird Table Designer</title>
  <style>
    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      padding: 16px;
      margin: 0;
    }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input[type="text"], select {
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, #555);
      padding: 4px 6px;
      font-size: inherit;
      border-radius: 2px;
    }
    input[type="text"] { width: 100%; box-sizing: border-box; }
    .table-name-row { margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    th { text-align: left; padding: 6px 8px; background: var(--vscode-editor-lineHighlightBackground, #333); border-bottom: 1px solid var(--vscode-input-border, #555); }
    td { padding: 4px 8px; border-bottom: 1px solid var(--vscode-input-border, #333); vertical-align: middle; }
    td input[type="text"], td select { width: 100%; }
    td input[type="checkbox"] { width: auto; cursor: pointer; }
    button {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      font-size: inherit;
      border-radius: 2px;
      margin-right: 8px;
    }
    button:hover { background: var(--vscode-button-hoverBackground); }
    button.secondary {
      background: var(--vscode-button-secondaryBackground, #444);
      color: var(--vscode-button-secondaryForeground, #ccc);
    }
    button.secondary:hover { background: var(--vscode-button-secondaryHoverBackground, #555); }
    button.danger { background: #c0392b; color: #fff; }
    button.danger:hover { background: #e74c3c; }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    #ddl-output {
      margin-top: 16px;
      background: var(--vscode-textCodeBlock-background, #1e1e1e);
      color: var(--vscode-editor-foreground);
      padding: 12px;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      white-space: pre;
      border-radius: 4px;
      display: none;
    }
    .remove-col { background: transparent; color: var(--vscode-errorForeground, #f44); border: none; cursor: pointer; padding: 2px 6px; font-size: 16px; }
    .remove-col:hover { color: #e74c3c; }
  </style>
</head>
<body>
  <h2 id="heading">Create Table</h2>

  <div class="table-name-row">
    <label for="tableName">Table Name</label>
    <input type="text" id="tableName" placeholder="MY_TABLE" />
  </div>

  <label>Columns</label>
  <table id="columnsTable">
    <thead>
      <tr>
        <th>Column Name</th>
        <th>Data Type</th>
        <th>Size</th>
        <th>Not Null</th>
        <th>Primary Key</th>
        <th>Default</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="columnsBody">
    </tbody>
  </table>

  <button class="secondary" id="addColumnBtn">+ Add Column</button>

  <div class="actions">
    <button id="generateBtn">Generate DDL in Editor</button>
    <button id="executeBtn">Execute DDL</button>
  </div>

  <pre id="ddl-output"></pre>

  <script>
    const vscode = acquireVsCodeApi();
    const types = ['VARCHAR','CHAR','INTEGER','SMALLINT','INT64','FLOAT','DOUBLE','DATE','TIME','TIMESTAMP','BLOB','BOOLEAN'];
    const SIZED_TYPES = ['VARCHAR','CHAR','CSTRING'];

    // 'create' generates CREATE TABLE; 'alter' diffs against originalColumns and generates
    // ALTER TABLE statements instead. Set from the "init" message the extension sends once this
    // script signals it's ready — never assumed up front, since the same page serves both modes.
    let mode = 'create';
    let pkConstraintName = null;
    let originalColumns = [];

    function escAttr(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function addRow(name, type, size, notNull, pk, dflt, original) {
      const tbody = document.getElementById('columnsBody');
      const tr = document.createElement('tr');
      if (original) {
        // Fixed at row creation — never re-read from the (editable) name field, so renaming a
        // column is detected as a rename (ALTER ... TO ...), not a drop-and-recreate that would
        // silently lose that column's data.
        tr.dataset.original = JSON.stringify(original);
      }
      // If the column's current type isn't one of the dropdown's options (e.g. an older/exotic
      // Firebird type this designer doesn't otherwise model), add it so the select shows the
      // real value instead of silently defaulting to the first option — which would otherwise
      // look like a no-op edit but actually emit a spurious, potentially destructive TYPE change.
      const options = (type && !types.includes(type)) ? [type, ...types] : types;
      tr.innerHTML = `
        <td><input type="text" class="col-name" value="${escAttr(name)}" placeholder="COLUMN_NAME"></td>
        <td>
          <select class="col-type">
            ${options.map(t => `<option value="${escAttr(t)}"${t===(type||'VARCHAR')?' selected':''}>${escAttr(t)}</option>`).join('')}
          </select>
        </td>
        <td><input type="text" class="col-size" value="${escAttr(size)}" placeholder="e.g. 100"></td>
        <td style="text-align:center"><input type="checkbox" class="col-notnull"${notNull?' checked':''}></td>
        <td style="text-align:center"><input type="checkbox" class="col-pk"${pk?' checked':''}></td>
        <td><input type="text" class="col-default" value="${escAttr(dflt)}" placeholder="default value"></td>
        <td><button class="remove-col" title="Remove column">&times;</button></td>
      `;
      tr.querySelector('.remove-col').addEventListener('click', () => tr.remove());
      tbody.appendChild(tr);
    }

    document.getElementById('addColumnBtn').addEventListener('click', () => addRow('', 'VARCHAR', '', false, false, ''));

    function typeString(type, size) {
      return (size && SIZED_TYPES.includes(type)) ? `${type}(${size})` : type;
    }

    function buildCreateDDL() {
      const tableName = document.getElementById('tableName').value.trim().toUpperCase() || 'NEW_TABLE';
      const rows = document.querySelectorAll('#columnsBody tr');
      const pkCols = [];
      const colDefs = [];

      rows.forEach(row => {
        const name = row.querySelector('.col-name').value.trim().toUpperCase();
        if (!name) return;
        const type = row.querySelector('.col-type').value;
        const size = row.querySelector('.col-size').value.trim();
        const notNull = row.querySelector('.col-notnull').checked;
        const pk = row.querySelector('.col-pk').checked;
        const dflt = row.querySelector('.col-default').value.trim();

        let colDef = `  ${name} ${type}`;
        if (size && SIZED_TYPES.includes(type)) colDef += `(${size})`;
        if (dflt) colDef += ` DEFAULT ${dflt}`;
        if (notNull) colDef += ' NOT NULL';
        colDefs.push(colDef);
        if (pk) pkCols.push(name);
      });

      if (pkCols.length > 0) {
        colDefs.push(`  PRIMARY KEY (${pkCols.join(', ')})`);
      }

      return `CREATE TABLE ${tableName} (\n${colDefs.join(',\n')}\n);`;
    }

    function buildAlterDDL() {
      const tableName = document.getElementById('tableName').value.trim().toUpperCase();
      const rows = document.querySelectorAll('#columnsBody tr');
      const statements = [];
      const seenOriginalNames = new Set();
      const currentPkNames = [];

      rows.forEach(row => {
        const name = row.querySelector('.col-name').value.trim().toUpperCase();
        if (!name) return;
        const type = row.querySelector('.col-type').value;
        const size = row.querySelector('.col-size').value.trim();
        const notNull = row.querySelector('.col-notnull').checked;
        const pk = row.querySelector('.col-pk').checked;
        const dflt = row.querySelector('.col-default').value.trim();
        if (pk) currentPkNames.push(name);

        if (!row.dataset.original) {
          // Brand new column (added via "+ Add Column" in alter mode).
          let colDef = `${name} ${type}`;
          if (size && SIZED_TYPES.includes(type)) colDef += `(${size})`;
          if (dflt) colDef += ` DEFAULT ${dflt}`;
          if (notNull) {
            colDef += ' NOT NULL';
            if (!dflt) {
              statements.push(`ALTER TABLE ${tableName} ADD ${colDef}; -- If this table already has rows, this may fail without a DEFAULT`);
              return;
            }
          }
          statements.push(`ALTER TABLE ${tableName} ADD ${colDef};`);
          return;
        }

        const original = JSON.parse(row.dataset.original);
        seenOriginalNames.add(original.name);

        if (name !== original.name) {
          statements.push(`ALTER TABLE ${tableName} ALTER COLUMN ${original.name} TO ${name};`);
        }

        if (typeString(original.type, original.size) !== typeString(type, size)) {
          statements.push(`ALTER TABLE ${tableName} ALTER COLUMN ${name} TYPE ${typeString(type, size)};`);
        }

        if ((original.dflt || '') !== dflt) {
          statements.push(dflt
            ? `ALTER TABLE ${tableName} ALTER COLUMN ${name} SET DEFAULT ${dflt};`
            : `ALTER TABLE ${tableName} ALTER COLUMN ${name} DROP DEFAULT;`);
        }

        if (Boolean(original.notNull) !== notNull) {
          const clause = notNull ? 'SET NOT NULL' : 'DROP NOT NULL';
          statements.push(`ALTER TABLE ${tableName} ALTER COLUMN ${name} ${clause}; -- Requires Firebird 4.0 or later`);
        }
      });

      originalColumns.forEach(col => {
        if (!seenOriginalNames.has(col.name)) {
          statements.push(`ALTER TABLE ${tableName} DROP ${col.name};`);
        }
      });

      const originalPkNames = originalColumns.filter(c => c.pk).map(c => c.name);
      const pkChanged = originalPkNames.length !== currentPkNames.length
        || !originalPkNames.every(n => currentPkNames.includes(n));
      if (pkChanged) {
        if (pkConstraintName) {
          statements.push(`ALTER TABLE ${tableName} DROP CONSTRAINT ${pkConstraintName};`);
        }
        if (currentPkNames.length > 0) {
          statements.push(`ALTER TABLE ${tableName} ADD PRIMARY KEY (${currentPkNames.join(', ')});`);
        }
      }

      return statements.length > 0 ? statements.join('\n') : '-- No changes detected.';
    }

    function buildDDL() {
      return mode === 'alter' ? buildAlterDDL() : buildCreateDDL();
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const ddl = buildDDL();
      document.getElementById('ddl-output').style.display = 'block';
      document.getElementById('ddl-output').textContent = ddl;
      vscode.postMessage({ command: 'openInEditor', ddl });
    });

    document.getElementById('executeBtn').addEventListener('click', () => {
      const ddl = buildDDL();
      document.getElementById('ddl-output').style.display = 'block';
      document.getElementById('ddl-output').textContent = ddl;
      vscode.postMessage({ command: 'executeDDL', ddl });
    });

    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.command === 'result') {
        document.getElementById('ddl-output').style.display = 'block';
        document.getElementById('ddl-output').textContent =
          (document.getElementById('ddl-output').textContent || '') + '\n-- ' + msg.data.text;
        return;
      }
      if (msg.command === 'init') {
        mode = msg.data.mode;
        if (mode === 'alter') {
          pkConstraintName = msg.data.pkConstraintName;
          originalColumns = msg.data.columns;
          document.getElementById('heading').textContent = `Alter Table: ${msg.data.tableName}`;
          const tableNameInput = document.getElementById('tableName');
          tableNameInput.value = msg.data.tableName;
          tableNameInput.readOnly = true;
          document.getElementById('columnsBody').innerHTML = '';
          originalColumns.forEach(col => addRow(col.name, col.type, col.size, col.notNull, col.pk, col.dflt, col));
          document.getElementById('generateBtn').textContent = 'Generate ALTER TABLE in Editor';
          document.getElementById('executeBtn').textContent = 'Execute ALTER TABLE';
        } else {
          // Default first column for a brand new table.
          addRow('ID', 'INTEGER', '', true, true, '');
        }
        return;
      }
    });

    vscode.postMessage({ command: 'ready' });
  </script>
</body>
</html>
